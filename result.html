<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荷物検索結果 | アストル運送</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f3f7;
}

header{
  background:#0f2e6d;
  color:white;
  padding:14px 16px;
  font-size:18px;
  font-weight:600;
  display:flex;
  align-items:center;
}

.logo{
  width:38px;
  height:38px;
  margin-right:10px;
}

.wrapper{
  padding:24px 16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.section-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:10px;
  font-size:15px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

input::placeholder{
  color:#aaa;
}

.primary-btn{
  width:100%;
  margin-top:14px;
  padding:12px;
  border:none;
  border-radius:14px;
  background:#0f2e6d;
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.clear-result-btn{
  width:100%;
  margin-top:16px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#e5e5e5;
  color:#555;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

/* ===== 検索結果ボックス ===== */
.result-box{
  display:flex;
  align-items:center;
  background:white;
  border-radius:16px;
  padding:18px;
  margin-top:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  text-decoration:none;
  color:black;
}

.check-icon{
  background:#0f2e6d;
  color:white;
  width:22px;
  height:22px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  margin-right:14px;
}

.result-content{
  flex:1;
}

.result-note{
  font-size:13px;
  white-space:nowrap;
}

.arrow{
  color:#0f2e6d;
  font-size:18px;
}

footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:30px 0 20px;
}
</style>
</head>

<body>

<header>
<svg class="logo" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" fill="#0f2e6d" stroke="#d83b3b" stroke-width="6"/>
  <g fill="white">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="150" cy="70" r="2.5"/>
    <circle cx="130" cy="40" r="2"/>
  </g>
  <circle cx="160" cy="55" r="9" fill="#e23b3b"/>
  <path d="M65 150 C65 80,85 45,100 40 C115 45,135 80,135 150"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M80 120 C100 90,120 75,150 60"
        fill="none" stroke="#e23b3b" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="100" cy="150" rx="60" ry="18" fill="#9aa3b2"/>
</svg>
アストル運送
</header>

<div class="wrapper">

  <div class="card">
    <div class="section-title">追跡番号検索</div>
    <input type="text" id="trackingNumber"
      placeholder="例) 0012-3456-7890" maxlength="14">
    <button class="primary-btn" onclick="searchTracking()">検索開始</button>
  </div>

  <div class="section-title" style="margin-top:26px;">荷物検索結果</div>

  <a href="detail.html" class="result-box">
    <div class="check-icon">✓</div>

    <div class="result-content">
      <div><strong>0002-1109-0101</strong></div>
      <div><strong>配達完了</strong></div>
      <div>3月12日(木) 22時00分　引渡完了</div>
      <div class="result-note">
        宅配ボックスにお届けさせていただきました。
      </div>
    </div>

    <div class="arrow">&gt;</div>
  </a>

  <button class="clear-result-btn" onclick="location.href='index.html'">
    検索結果をクリア
  </button>

</div>

<footer>
©︎ アストル運送
</footer>

<script>
const correctNumber = "0002-1109-0101";

function searchTracking(){
  const input = document.getElementById("trackingNumber").value;
  if(input === correctNumber){
    location.reload();
  }else{
    alert("その追跡番号は存在しません。番号をお確かめの上、再度ご入力ください。");
  }
}
</script>

</body>
</html>
