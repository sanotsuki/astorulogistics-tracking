<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荷物検索結果 | アストル運送</title>

<style>
:root{
  --main-blue:#0b3d91;
  --bg-light:#f4f6fb;
  --white:#ffffff;
  --gray:#777;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg-light);
}

/* ===== indexと完全同一ヘッダー ===== */
<header>
<svg class="logo" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" fill="#0f2e6d" stroke="#d83b3b" stroke-width="6"/>
  <g fill="white">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="150" cy="70" r="2.5"/>
    <circle cx="130" cy="40" r="2"/>
  </g>
  <circle cx="160" cy="55" r="9" fill="#e23b3b"/>
  <path d="M65 150 C65 80,85 45,100 40 C115 45,135 80,135 150"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M80 120 C100 90,120 75,150 60"
        fill="none" stroke="#e23b3b" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="100" cy="150" rx="60" ry="18" fill="#9aa3b2"/>
</svg>
アストル運送
</header>

.logo{
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
}

/* ===== コンテンツ ===== */
.container{
  padding:20px;
}

/* ===== 検索エリア ===== */
.search-area{
  background:var(--white);
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-title{
  font-weight:bold;
  margin-bottom:8px;
}

.search-box{
  width:100%;
  padding:6px; /* 縦幅スリム */
  font-size:13px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

.search-btn{
  margin-top:10px;
  width:100%;
  padding:8px;
  background:var(--main-blue);
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
}

/* ===== 検索結果 ===== */
.result-title{
  margin-top:25px;
  font-weight:bold;
}

.result-item{
  display:flex;
  align-items:center;
  background:var(--white);
  border-radius:12px;
  padding:14px;
  margin-top:12px;
  text-decoration:none;
  color:#000;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.check-icon{
  background:var(--main-blue);
  color:#fff;
  width:22px;
  height:22px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  margin-right:12px;
}

.result-text{
  flex:1;
}

.arrow{
  font-size:18px;
  color:var(--main-blue);
}

/* ===== フッター ===== */
footer{
  margin-top:40px;
  text-align:center;
  font-size:12px;
  color:var(--gray);
  padding:15px 0;
}
</style>
</head>

<body>

<header>
  <div class="logo">アストル運送</div>
</header>

<div class="container">

  <!-- 検索エリア -->
  <div class="search-area">
    <div class="search-title">追跡番号検索</div>
    <input type="text" id="trackingNumber" class="search-box"
      placeholder="例) 0012-3456-7890" maxlength="14">
    <button class="search-btn" onclick="searchTracking()">検索開始</button>
  </div>

  <!-- 検索結果 -->
  <div class="result-title">荷物検索結果</div>

  <a href="detail.html" class="result-item">
    <div class="check-icon">✓</div>

    <div class="result-text">
      <div><strong>0002-1109-0101</strong></div>
      <div><strong>配達完了</strong></div>
      <div>3月12日(木) 22時00分　引渡完了</div>
      <div style="font-size:12px; white-space:nowrap;">
        宅配ボックスにお届けさせていただきました。
      </div>
    </div>

    <div class="arrow">&gt;</div>
  </a>

  <!-- クリアでindexへ戻る -->
  <button class="search-btn"
    style="margin-top:15px; background:#e0e0e0; color:#000;"
    onclick="location.href='index.html'">
    検索結果をクリア
  </button>

</div>

<footer>
  ©︎ アストル運送
</footer>

<script>
const correctNumber = "0002-1109-0101";

function searchTracking(){
  const input = document.getElementById("trackingNumber").value;
  if(input === correctNumber){
    location.reload();
  }else{
    alert("その追跡番号は存在しません。番号をお確かめの上、再度ご入力ください。");
  }
}
</script>

</body>
</html>
