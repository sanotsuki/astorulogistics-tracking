<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荷物検索結果 | アストル運送</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background:#f5f7fb;
}

/* ===== ヘッダー ===== */
header{
  background:#0d47a1;
  color:#fff;
  text-align:center;
  padding:18px 0;
  font-size:20px;
  font-weight:bold;
}

/* ===== コンテンツ ===== */
.container{
  padding:20px;
}

/* ===== 検索ボックス（indexより縦幅小さめ） ===== */
.search-area{
  background:#fff;
  padding:15px;
  border-radius:10px;
}

.search-title{
  font-weight:bold;
  margin-bottom:8px;
}

.search-box{
  width:100%;
  padding:8px;              /* 縦幅さらに縮小 */
  font-size:14px;           /* 1pt小さめ */
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

.search-btn{
  margin-top:10px;
  width:100%;
  padding:9px;
  background:#0d47a1;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
}

.clear-btn{
  margin-top:8px;
  width:100%;
  padding:8px;
  background:#e0e0e0;
  border:none;
  border-radius:6px;
  font-size:13px;
}

/* ===== 検索結果ボックス ===== */
.result-title{
  margin-top:25px;
  font-weight:bold;
}

.result-item{
  display:flex;
  align-items:center;
  background:#ffffff;
  border-radius:10px;
  padding:14px;
  margin-top:12px;
  text-decoration:none;
  color:#000;
  position:relative;
}

/* 四角チェックマーク */
.check-icon{
  background:#0d47a1;
  color:#fff;
  width:22px;
  height:22px;
  border-radius:4px; /* 四角 */
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  margin-right:10px;
}

.result-text{
  flex:1;
}

.arrow{
  font-size:18px;
  color:#0d47a1;
}

/* ===== フッター ===== */
footer{
  margin-top:40px;
  text-align:center;
  font-size:12px;
  color:#777;
  padding:15px 0;
}
</style>
</head>

<body>

<header>アストル運送</header>

<div class="container">

  <!-- 検索エリア -->
  <div class="search-area">
    <div class="search-title">追跡番号検索</div>
    <input type="text" id="trackingNumber" class="search-box" 
      placeholder="例) 0012-3456-7890" maxlength="14">
    <button class="search-btn" onclick="searchTracking()">検索開始</button>
    <button class="clear-btn" onclick="clearInput()">入力内容をクリア</button>
  </div>

  <!-- 検索結果 -->
  <div class="result-title">荷物検索結果</div>

  <a href="detail.html" class="result-item">
    <div class="check-icon">✓</div>

    <div class="result-text">
      <div><strong>0002-1109-0101</strong></div>
      <div><strong>配達完了</strong></div>
      <div>3月12日(木) 22時00分　引渡完了</div>
      <div style="font-size:12px; white-space:nowrap;">
        宅配ボックスにお届けさせていただきました。
      </div>
    </div>

    <div class="arrow">&gt;</div>
  </a>

  <button class="clear-btn" style="margin-top:15px;" onclick="clearResult()">検索結果をクリア</button>

</div>

<footer>
  ©︎ アストル運送
</footer>

<script>
const correctNumber = "0002-1109-0101";

/* 検索処理（indexと同じ判定） */
function searchTracking(){
  const input = document.getElementById("trackingNumber").value;
  if(input === correctNumber){
    alert("このページは検索結果ページです。");
  }else{
    alert("その追跡番号は存在しません。番号をお確かめの上、再度ご入力ください。");
  }
}

/* 入力クリア */
function clearInput(){
  document.getElementById("trackingNumber").value = "";
}

/* 結果クリア */
function clearResult(){
  location.reload();
}
</script>

</body>
</html>
