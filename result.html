<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荷物検索結果 | アストル運送</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:#f4f6fb;
}

/* ===== indexと同じヘッダー ===== */
header{
  background:#0b3d91; /* indexと同じ深い青 */
  color:#fff;
  text-align:center;
  padding:18px 0;
  font-size:20px;
  font-weight:bold;
  letter-spacing:1px;
}

/* ===== コンテンツ ===== */
.container{
  padding:20px;
}

/* ===== 検索エリア ===== */
.search-area{
  background:#ffffff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.search-title{
  font-weight:bold;
  margin-bottom:8px;
}

.search-box{
  width:100%;
  padding:6px;              /* 縦幅をさらにスリムに */
  font-size:13px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

.search-btn{
  margin-top:10px;
  width:100%;
  padding:8px;
  background:#0b3d91;
  color:#fff;
  border:none;
  border-radius:6px;
  font-size:14px;
}

/* ===== 検索結果 ===== */
.result-title{
  margin-top:25px;
  font-weight:bold;
}

.result-item{
  display:flex;
  align-items:center;
  background:#ffffff;
  border-radius:12px;
  padding:14px;
  margin-top:12px;
  text-decoration:none;
  color:#000;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* 四角チェック */
.check-icon{
  background:#0b3d91;
  color:#fff;
  width:22px;
  height:22px;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px; /* 少し小さめ */
  margin-right:12px;
}

.result-text{
  flex:1;
}

.arrow{
  font-size:18px;
  color:#0b3d91;
}

/* ===== フッター ===== */
footer{
  margin-top:40px;
  text-align:center;
  font-size:12px;
  color:#777;
  padding:15px 0;
}
</style>
</head>

<body>

<header>
  アストル運送
</header>

<div class="container">

  <!-- 検索エリア -->
  <div class="search-area">
    <div class="search-title">追跡番号検索</div>
    <input type="text" id="trackingNumber" class="search-box"
      placeholder="例) 0012-3456-7890" maxlength="14">
    <button class="search-btn" onclick="searchTracking()">検索開始</button>
  </div>

  <!-- 検索結果 -->
  <div class="result-title">荷物検索結果</div>

  <a href="detail.html" class="result-item">
    <div class="check-icon">✓</div>

    <div class="result-text">
      <div><strong>0002-1109-0101</strong></div>
      <div><strong>配達完了</strong></div>
      <div>3月12日(木) 22時00分　引渡完了</div>
      <div style="font-size:12px; white-space:nowrap;">
        宅配ボックスにお届けさせていただきました。
      </div>
    </div>

    <div class="arrow">&gt;</div>
  </a>

  <!-- クリアでindexへ戻る -->
  <button class="search-btn" style="margin-top:15px; background:#e0e0e0; color:#000;"
    onclick="location.href='index.html'">
    検索結果をクリア
  </button>

</div>

<footer>
  ©︎ アストル運送
</footer>

<script>
const correctNumber = "0002-1109-0101";

function searchTracking(){
  const input = document.getElementById("trackingNumber").value;
  if(input === correctNumber){
    location.reload();
  }else{
    alert("その追跡番号は存在しません。番号をお確かめの上、再度ご入力ください。");
  }
}
</script>

</body>
</html>
