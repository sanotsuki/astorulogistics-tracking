<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>検索結果</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f3f7;
}

header{
  background:#0f2e6d;
  color:white;
  padding:16px;
  font-weight:600;
}

.wrapper{
  padding:16px;
}

.summary{
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  text-decoration:none;
  color:black;
  display:block;
}

.status{
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

.from{
  font-size:14px;
  color:#555;
  margin-bottom:18px;
}

.bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:10px;
}

.circle{
  width:16px;
  height:16px;
  background:#0f2e6d;
  border-radius:50%;
}

.line{
  flex:1;
  height:4px;
  background:#0f2e6d;
}

.labels{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin-top:8px;
  color:#555;
}
</style>
</head>

<body>

<header>検索結果</header>

<div class="wrapper">

<a href="detail.html" class="summary">

<div class="status">
22時00分　お届け済み（宅配ボックス）
</div>

<div class="from">
チームアストルさまより
</div>

<div class="bar">
<div class="circle"></div>
<div class="line"></div>
<div class="circle"></div>
<div class="line"></div>
<div class="circle"></div>
</div>

<div class="labels">
<span>発送</span>
<span>営業所</span>
<span>到着</span>
</div>

</a>

</div>

</body>
</html>
