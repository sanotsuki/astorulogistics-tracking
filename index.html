<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アストル運送 - 荷物検索</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;
  background:#f2f4f8;
  color:#222;
}

header{
  background:#1f3fa3;
  color:white;
  padding:18px;
  display:flex;
  align-items:center;
  gap:16px;
}

.logo{
  width:72px;
  height:72px;
}

header h1{
  font-size:26px;
  margin:0;
  font-weight:700;
  letter-spacing:1px;
}

/* 検索 */
.search-wrapper{
  padding:28px 16px;
}

.search-box{
  background:white;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

.tabs{
  display:flex;
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:18px;
}

.tabs div{
  flex:1;
  text-align:center;
  padding:10px;
  font-weight:600;
  font-size:14px;
}

.active{
  background:#2d4ecf;
  color:white;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:14px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:40px 20px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<header>

<!-- ===== バッジ型Aロゴ ===== -->
<svg class="logo" viewBox="0 0 200 200">

  <!-- 外枠 -->
  <circle cx="100" cy="100" r="95" fill="#1b2f5f" stroke="#d32f2f" stroke-width="6"/>
  <circle cx="100" cy="100" r="88" fill="#1b2f5f" stroke="white" stroke-width="3"/>

  <!-- 星 -->
  <circle cx="60" cy="60" r="3" fill="white"/>
  <circle cx="140" cy="70" r="2.5" fill="white"/>
  <circle cx="120" cy="40" r="2" fill="white"/>
  <circle cx="80" cy="120" r="2" fill="white"/>

  <!-- Aアーチ -->
  <path d="M100 30 
           C70 60, 70 120, 100 160
           C130 120, 130 60, 100 30"
        fill="none"
        stroke="white"
        stroke-width="14"
        stroke-linecap="round"/>

  <!-- 地平線 -->
  <path d="M40 130 Q100 110 160 130"
        fill="#8c99a6"/>

  <!-- 軌道ライン -->
  <path d="M60 110 
           Q120 60 160 80"
        fill="none"
        stroke="#d32f2f"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- 惑星 -->
  <circle cx="160" cy="80" r="8" fill="#d32f2f"/>

</svg>

<h1>アストル運送</h1>

</header>

<div class="search-wrapper">
  <div class="search-box">
    <div class="tabs">
      <div class="active">送り状番号</div>
      <div>QR検索</div>
    </div>

    <input type="text" id="tracking" placeholder="例）1234-5678-9000">
    <button onclick="search()">検索</button>
  </div>
</div>

<footer>
  © 2026 Astrul Express
</footer>

<script>
function search(){
  const input = document.getElementById("tracking").value.trim();
  if(input === "2026-0125-0101"){
    window.location.href = "result.html";
  } else {
    window.location.href = "404.html";
  }
}
</script>

</body>
</html>
