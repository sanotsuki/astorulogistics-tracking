<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アストル運送 - 追跡</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f3f7;
}

header{
  background:#0f2e6d;
  color:white;
  padding:14px 16px;
  font-size:18px;
  font-weight:600;
  display:flex;
  align-items:center;
}

.logo{
  width:38px;
  height:38px;
  margin-right:10px;
}

.wrapper{
  padding:24px 16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.section-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:18px;
}

input{
  width:100%;
  padding:14px;
  font-size:16px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

input::placeholder{
  color:#aaa;
}

.primary-btn{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#0f2e6d;
  color:white;
  font-size:16px;
  font-weight:600;
}

.clear-btn{
  width:100%;
  margin-top:14px;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#e5e5e5;
  color:#555;
  font-size:16px;
  font-weight:600;
}

footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:30px 0 20px;
}
</style>
</head>

<body>

<header>
<svg class="logo" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" fill="#0f2e6d" stroke="#d83b3b" stroke-width="6"/>
  <g fill="white">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="150" cy="70" r="2.5"/>
    <circle cx="130" cy="40" r="2"/>
  </g>
  <circle cx="160" cy="55" r="9" fill="#e23b3b"/>
  <path d="M65 150 C65 80,85 45,100 40 C115 45,135 80,135 150"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M80 120 C100 90,120 75,150 60"
        fill="none" stroke="#e23b3b" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="100" cy="150" rx="60" ry="18" fill="#9aa3b2"/>
</svg>
アストル運送
</header>

<div class="wrapper">
  <div class="card">

    <div class="section-title">追跡番号検索</div>

    <form action="result.html">
      <input 
        type="text"
        id="tracking"
        name="tracking"
        placeholder="例) 0012-3456-7890"
        inputmode="numeric"
        maxlength="14"
        required
      >

      <button type="submit" class="primary-btn">追跡する</button>
      <button type="button" class="clear-btn" onclick="clearInput()">入力内容をクリア</button>

    </form>

  </div>
</div>

<footer>©︎ アストル運送</footer>

<script>
const input = document.getElementById("tracking");

input.addEventListener("input", function(){

  let numbers = this.value.replace(/\D/g, "");
  numbers = numbers.substring(0,12);
  let formatted = numbers.replace(/(\d{4})(?=\d)/g, "$1-");
  this.value = formatted;

});

function clearInput(){
  input.value = "";
}
</script>

</body>
</html>
