<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アストル運送</title>

<style>
body{
  margin:0;
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f4f6fa;
}

/* ===== ヘッダー ===== */
header{
  background:#0c1c3c;
  color:white;
  display:flex;
  align-items:center;
  padding:12px 20px;
  gap:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.logo{
  width:52px;
  height:52px;
}

.company{
  font-size:20px;
  font-weight:600;
  letter-spacing:2px;
}

/* ===== コンテンツ ===== */
.container{
  padding:30px;
  max-width:800px;
  margin:auto;
}

.card{
  background:white;
  padding:24px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
  margin-bottom:24px;
}

h2{
  margin-top:0;
}

input,button{
  padding:10px;
  font-size:16px;
}

button{
  background:#0c1c3c;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  opacity:0.85;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<!-- ===== 共通ヘッダー ===== -->
<header>
<svg class="logo" viewBox="0 0 200 200">
  <!-- 外枠 -->
  <circle cx="100" cy="100" r="95" fill="#132a55" stroke="#d83b3b" stroke-width="6"/>
  
  <!-- 星 -->
  <g fill="white" opacity="0.9">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="150" cy="70" r="2.5"/>
    <circle cx="130" cy="40" r="2"/>
    <circle cx="70" cy="120" r="2.5"/>
  </g>

  <!-- 赤い惑星 -->
  <circle cx="155" cy="55" r="8" fill="#e23b3b"/>

  <!-- ロケット軌道A（上半分のみ・白単色） -->
  <path d="
    M60 140
    C40 110, 70 60, 100 50
    C135 38, 160 70, 140 105
    " 
    fill="none"
    stroke="white"
    stroke-width="14"
    stroke-linecap="round"
  />

</svg>

<div class="company">アストル運送</div>
</header>

<div class="container">

<!-- ===== トップ（検索） ===== -->
<div class="card" id="searchPage">
  <h2>荷物検索</h2>
  <input type="text" id="trackingInput" placeholder="追跡番号を入力">
  <button onclick="search()">検索</button>
</div>

<!-- ===== 検索結果 ===== -->
<div class="card hidden" id="resultPage">
  <h2>荷物検索結果</h2>
  <p><strong>配送状況：</strong>配送中</p>
  <p><strong>現在地：</strong>東京物流センター</p>
  <button onclick="showDetail()">配達詳細を見る</button>
</div>

<!-- ===== 配達詳細 ===== -->
<div class="card hidden" id="detailPage">
  <h2>配達詳細</h2>
  <p>3/3 08:00　荷物受付</p>
  <p>3/3 12:30　仕分け完了</p>
  <p>3/3 18:00　配送センター出発</p>
  <p>現在：配送中</p>
  <button onclick="backHome()">トップへ戻る</button>
</div>

</div>

<script>
function search(){
  document.getElementById("searchPage").classList.add("hidden");
  document.getElementById("resultPage").classList.remove("hidden");
}

function showDetail(){
  document.getElementById("resultPage").classList.add("hidden");
  document.getElementById("detailPage").classList.remove("hidden");
}

function backHome(){
  document.getElementById("detailPage").classList.add("hidden");
  document.getElementById("searchPage").classList.remove("hidden");
}
</script>

</body>
</html>
