<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アストル運送 - 荷物検索</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;
  background:#f2f4f8;
  color:#222;
}

/* ===== ヘッダー ===== */
header{
  background:#1f3fa3;
  color:white;
  padding:18px;
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:38px;
  height:38px;
}

header h1{
  font-size:26px;
  margin:0;
  font-weight:700;
  letter-spacing:1px;
}

/* ===== 検索エリア ===== */
.search-wrapper{
  padding:24px 16px;
}

.search-box{
  background:white;
  border-radius:18px;
  padding:22px;
  box-shadow:0 10px 24px rgba(0,0,0,0.08);
}

.tabs{
  display:flex;
  border:1px solid #ddd;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:18px;
}

.tabs div{
  flex:1;
  text-align:center;
  padding:10px;
  font-weight:600;
  font-size:14px;
}

.active{
  background:#2d4ecf;
  color:white;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
  margin-bottom:14px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

button:active{
  opacity:0.8;
}

/* ===== フッター ===== */
footer{
  text-align:center;
  padding:40px 20px;
  font-size:13px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <!-- Aロケットロゴ -->
  <svg class="logo" viewBox="0 0 60 60">
    <!-- A型ロケット本体 -->
    <path d="M30 5 
             L50 50 
             L40 50 
             L34 38 
             L26 38 
             L20 50 
             L10 50 
             Z"
          fill="white"/>
    
    <!-- コックピット -->
    <circle cx="30" cy="22" r="4" fill="#1f3fa3"/>

    <!-- 噴射 -->
    <path d="M30 50 
             Q27 58 30 55 
             Q33 58 30 50"
          fill="white"/>
  </svg>

  <h1>アストル運送</h1>
</header>

<div class="search-wrapper">
  <div class="search-box">
    <div class="tabs">
      <div class="active">送り状番号</div>
      <div>QR検索</div>
    </div>

    <input type="text" id="tracking" placeholder="例）1234-5678-9000">
    <button onclick="search()">検索</button>
  </div>
</div>

<footer>
  © 2026 Astrul Express
</footer>

<script>
function search(){
  const input=document.getElementById("tracking").value;
  if(input==="2026-0125-0101"){
    window.location.href="result.html";
  }else{
    window.location.href="404.html";
  }
}
</script>

</body>
</html>
