<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配達詳細 | アストル運送</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f3f7;
}

/* ===== ヘッダー（index/resultと完全統一） ===== */
header{
  background:#0f2e6d;
  color:white;
  padding:14px 16px;
  font-size:18px;
  font-weight:600;
  display:flex;
  align-items:center;
}

.logo{
  width:38px;
  height:38px;
  margin-right:10px;
}

.wrapper{
  padding:24px 16px;
}

/* ===== カード ===== */
.card{
  background:white;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

.section-title{
  font-size:18px;
  font-weight:600;
  margin-bottom:16px;
}

footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:30px 0 20px;
}

/* ===== タイムライン ===== */
.timeline{
  border-left:3px solid #0f2e6d;
  margin-left:10px;
  padding-left:20px;
}

.timeline-item{
  position:relative;
  margin-bottom:24px;
}

.timeline-item::before{
  content:"";
  position:absolute;
  left:-29px;
  top:4px;
  width:14px;
  height:14px;
  background:#9aa3b2;
  border-radius:50%;
}

.timeline-item.latest::before{
  background:#d83b3b;
}

.time{
  font-size:13px;
  color:#666;
  margin-bottom:4px;
}

.status{
  font-weight:600;
  margin-bottom:2px;
}

.office{
  font-size:13px;
  color:#444;
}
</style>
</head>

<body>
