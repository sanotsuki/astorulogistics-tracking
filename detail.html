<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>配達詳細 | アストル運送</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f3f7;
  font-size:17px;
}

/* ===== ヘッダー ===== */
header{
  background:#0f2e6d;
  color:white;
  padding:14px 16px;
  font-size:19px;
  font-weight:600;
  display:flex;
  align-items:center;
}

.logo{
  width:38px;
  height:38px;
  margin-right:10px;
}

.wrapper{
  padding:24px 16px;
  max-width:480px;
  margin:0 auto;
}

/* ===== カード ===== */
.card{
  background:white;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:20px;
}

.section-title{
  font-size:19px;
  font-weight:600;
  margin-bottom:10px;
}

footer{
  text-align:center;
  font-size:13px;
  color:#777;
  padding:30px 0 20px;
}

/* ===== 追跡番号 ===== */
.tracking-number{
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
}

/* ===== グレー情報ボックス ===== */
.status-box{
  background:#eef0f4;
  border-radius:12px;
  padding:18px;
  margin:18px 0 28px;
}

.status-date{
  font-size:15px;
  margin-bottom:6px;
}

.status-main{
  font-weight:700;
  font-size:17px;
  margin-bottom:6px;
}

.status-sub{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.status-pass{
  font-size:15px;
}

/* ===== 横サマリー ===== */
.summary{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:6px;
}

.summary-step{
  text-align:center;
  flex:1;
}

.circle{
  width:22px;
  height:22px;
  border-radius:50%;
  background:#c4c9d4;
  margin:0 auto 6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:700;
  color:white;
}

.circle.completed{
  background:#0f2e6d;
}

.line{
  height:4px;
  background:#c4c9d4;
  flex:1;
}

.line.completed{
  background:#0f2e6d;
}

.label{
  font-size:13px;
  color:#444;
}

/* ===== 非活性ボタン ===== */
.button-area{
  max-width:480px;
  margin:0 auto 10px auto;
}

.dummy-btn{
  width:100%;
  padding:15px;
  margin-bottom:12px;
  border-radius:12px;
  background:#e5e7eb;
  color:#9aa3b2;
  font-weight:600;
  text-align:center;
  pointer-events:none;
  cursor:default;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.06);
}

.dummy-btn:last-child{
  margin-bottom:0;
}
</style>
</head>

<body>

<header>
<svg class="logo" viewBox="0 0 200 200">
  <circle cx="100" cy="100" r="95" fill="#0f2e6d" stroke="#d83b3b" stroke-width="6"/>
  <g fill="white">
    <circle cx="50" cy="60" r="3"/>
    <circle cx="150" cy="70" r="2.5"/>
    <circle cx="130" cy="40" r="2"/>
  </g>
  <circle cx="160" cy="55" r="9" fill="#e23b3b"/>
  <path d="M65 150 C65 80,85 45,100 40 C115 45,135 80,135 150"
        fill="none" stroke="white" stroke-width="16" stroke-linecap="round"/>
  <path d="M80 120 C100 90,120 75,150 60"
        fill="none" stroke="#e23b3b" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="100" cy="150" rx="60" ry="18" fill="#9aa3b2"/>
</svg>
アストル運送
</header>

<div class="wrapper">

  <div class="section-title" style="margin-left:4px;">お荷物情報</div>

  <div class="card">
    <p>
      <strong>追跡番号：</strong>
      <span class="tracking-number" style="pointer-events:none;">
        0002-1109-0101
      </span>
    </p>

    <p><strong>受取：</strong>送り状の住所</p>

    <div class="status-box">
      <div class="status-date">3月12日(木)22時00分 引渡完了</div>
      <div class="status-main">配達完了 (宅配ボックス1番)</div>
      <div class="status-sub">
        宅配ボックスにお届けさせていただきました。
      </div>
      <div class="status-pass">暗証番号: 0123</div>
    </div>

    <div class="summary">
      <div class="summary-step">
        <div class="circle completed"></div>
        <div class="label">発送</div>
      </div>
      <div class="line completed"></div>
      <div class="summary-step">
        <div class="circle completed"></div>
        <div class="label">営業所</div>
      </div>
      <div class="line completed"></div>
      <div class="summary-step">
        <div class="circle completed">✓</div>
        <div class="label">到着</div>
      </div>
    </div>
  </div>

</div>

<!-- ボタンはカード外 -->
<div class="button-area">
  <div class="dummy-btn">日時変更（対面・宅配ボックス）</div>
  <div class="dummy-btn">場所変更（営業所・コンビニなど）</div>
</div>

<footer>
©︎ アストル運送
</footer>

</body>
</html>
