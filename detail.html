<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アストル運送 - お荷物詳細</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f2f3f7;
}

header{
  background:#0f2e6d;
  color:white;
  padding:14px 16px;
  font-size:18px;
  font-weight:600;
}

.wrapper{
  max-width:430px;
  margin:0 auto;
  padding:24px 16px;
}

.card{
  background:white;
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  margin-bottom:18px;
}

/* ===== 横タイムライン ===== */

.summary{
  margin-top:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.step{
  text-align:center;
  flex:1;
  position:relative;
  font-size:14px;
}

.step:not(:last-child)::after{
  content:"";
  position:absolute;
  top:12px;
  right:-50%;
  width:100%;
  height:3px;
  background:#0f2e6d;
  z-index:0;
}

.circle{
  width:24px;
  height:24px;
  border-radius:50%;
  background:#0f2e6d;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 6px;
  font-size:13px;
  position:relative;
  z-index:1;
}

/* ===== ボタン ===== */

.dummy-btn{
  background:#e5e5e5;
  color:#555;
  font-size:16px;
  font-weight:600;
  padding:14px;
  border-radius:14px;
  text-align:center;
  margin:0 0 14px 0;
  width:100%;
  box-sizing:border-box;
}

.home-btn{
  background:#0f2e6d;
  color:white;
  font-size:16px;
  font-weight:600;
  padding:14px;
  border-radius:14px;
  text-align:center;
  width:100%;
  box-sizing:border-box;
  text-decoration:none;
  display:block;
  margin-bottom:14px;
}

/* ===== 縦タイムライン ===== */

.status-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:16px;
}

.timeline-wrapper{
  position:relative;
  padding-left:26px;
}

.timeline-wrapper::before{
  content:"";
  position:absolute;
  left:12px;
  top:0;
  bottom:0;
  width:3px;
  background:#ccc;
  z-index:0;
}

.timeline-item{
  margin-bottom:16px;
  position:relative;
}

.timeline-card{
  background:#f7f7f7;
  border-radius:14px;
  padding:16px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  position:relative;
  z-index:1;
}

.timeline-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:15px;
  font-weight:600;
}

.timeline-date{
  font-weight:400;
  font-size:14px;
  margin-right:8px;
}

/* ▼ CSS三角矢印 */
.arrow{
  width:0;
  height:0;
  border-left:6px solid transparent;
  border-right:6px solid transparent;
  border-top:8px solid #333;
  transition:transform 0.25s ease;
}

.timeline-item.active .arrow{
  transform:rotate(180deg);
}

.timeline-detail{
  display:none;
  margin-top:10px;
  font-size:14px;
  color:#555;
}

.timeline-item.active .timeline-detail{
  display:block;
}

footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:30px 0 20px;
}
</style>
</head>

<body>

<header>アストル運送</header>

<div class="wrapper">

  <div class="card">
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">
      追跡番号:0002-1109-0101
    </div>

    <div class="summary">
      <div class="step">
        <div class="circle"></div>
        発送
      </div>
      <div class="step">
        <div class="circle"></div>
        営業所
      </div>
      <div class="step">
        <div class="circle">✓</div>
        到着
      </div>
    </div>
  </div>

  <div class="dummy-btn">日時変更（対面・宅配ボックス）</div>
  <div class="dummy-btn">場所変更（営業所・コンビニなど）</div>

  <div class="card">
    <div class="status-title">荷物状況</div>

    <div class="timeline-wrapper">

      <div class="timeline-item">
        <div class="timeline-card" onclick="toggle(this)">
          <div class="timeline-header">
            <span>荷物受付</span>
            <span style="display:flex;align-items:center;">
              <span class="timeline-date">3/10 10:00</span>
              <span class="arrow"></span>
            </span>
          </div>
          <div class="timeline-detail">受付が完了しました。</div>
        </div>
      </div>

      <div class="timeline-item">
        <div class="timeline-card" onclick="toggle(this)">
          <div class="timeline-header">
            <span>発送</span>
            <span style="display:flex;align-items:center;">
              <span class="timeline-date">3/10 18:00</span>
              <span class="arrow"></span>
            </span>
          </div>
          <div class="timeline-detail">発送作業が完了しました。</div>
        </div>
      </div>

    </div>
  </div>

  <!-- ★ カードの外に移動 -->
  <a href="birthday.html" class="home-btn">ホームへ戻る</a>

</div>

<footer>©︎ アストル運送</footer>

<script>
function toggle(el){
  el.parentElement.classList.toggle("active");
}
</script>

</body>
</html>
